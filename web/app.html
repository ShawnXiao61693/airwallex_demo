<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>用户端 · Airwallex 销售情报</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body class="app-bg">

<header class="pagehead">
  <div class="wrap row">
    <div class="wordmark"><span class="dot"></span>销售情报 · 用户端</div>
    <a class="back" href="index.html">← 返回首页</a>
  </div>
</header>

<!-- 选择身份 -->
<div id="authView" class="auth-wrap">
  <div class="card auth-card">
    <h1>选择身份进入</h1>
    <p class="sub">同一天的情报，AE 和 AM 看到的不一样——选一个身份体验。</p>
    <div class="user-opts">
      <div class="user-opt" onclick="enterAs('AE')">
        <div class="ua ua-ae">A</div>
        <div class="ut"><strong>Alex</strong><span>AE · 拓新销售（Hunter）· 跨境电商</span></div>
        <span class="ugo">→</span>
      </div>
      <div class="user-opt" onclick="enterAs('AM')">
        <div class="ua ua-am">C</div>
        <div class="ut"><strong>Cindy</strong><span>AM · 客户成功（Farmer）· SaaS</span></div>
        <span class="ugo">→</span>
      </div>
    </div>
  </div>
</div>

<!-- 报告 -->
<div id="reportView" class="wrap" style="display:none">
  <div class="report-top">
    <div>
      <div class="eyebrow">每日情报</div>
      <h1 id="rTitle">日报</h1>
      <div class="report-meta" id="rMeta"></div>
    </div>
    <div class="who" id="who"></div>
  </div>

  <!-- 周期切换 -->
  <div class="tabs" style="padding:14px 0 0">
    <button class="tab on" data-cad="daily" onclick="switchCad(this)">日报</button>
    <button class="tab" data-cad="weekly" onclick="switchCad(this)">周报</button>
    <button class="tab" data-cad="monthly" onclick="switchCad(this)">月报</button>
  </div>

  <div id="dailyView">
  <!-- 日期选择器（前一天 / 日历下拉 / 后一天）-->
  <div class="datebar" id="datebar">
    <div class="dayrow">
      <button class="daynav" id="prevDay" onclick="stepDay(-1)">‹ 前一天</button>
      <button class="datebtn" onclick="toggleCal(event)">
        <span>📅</span><span id="dateBtnLabel">选择日期</span><span class="caret">▾</span>
      </button>
      <button class="daynav" id="nextDay" onclick="stepDay(1)">后一天 ›</button>
    </div>
    <div class="calpop" id="calpop">
      <div class="cal-head">
        <button class="cal-nav" onclick="calMonth(-1,event)">‹</button>
        <span class="cal-title" id="calTitle"></span>
        <button class="cal-nav" onclick="calMonth(1,event)">›</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="cal-foot"><span class="dot-legend"></span>有日报的日期可点击</div>
    </div>
  </div>

  <div id="intelList"></div>
  </div><!-- /dailyView -->

  <div id="weeklyView" style="display:none"></div>
  <div id="monthlyView" style="display:none"></div>
</div>

<!-- 匹配客户 modal -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <button class="modal-x" onclick="closeModal()">×</button>
    <div class="eyebrow" id="mEyebrow">匹配我的客户 · 实时分析</div>
    <h3 id="mTitle"></h3>
    <div id="mBody"></div>
  </div>
</div>

<script>
const REPORT_DIR='data/reports';
let ROLE="AE";
let AVAIL={};          // 当前角色：date -> count（哪些天有日报）
let DATES=[];          // 有日报的日期，升序
let CUR_ITEMS=[];      // 当前展示的情报，供话术 modal 取数
let SEL_DATE=null;     // 选中的日期
let calY, calM;        // 日历当前显示的年/月（0-based month）

// 只有两个用户：Alex(AE) / Cindy(AM)，用于对比两个角色看到的日报差异
const USERS={
  AE:{name:'Alex',  who:'AE · 拓新 · 跨境电商'},
  AM:{name:'Cindy', who:'AM · 客户成功 · SaaS'},
};
function enterAs(role){ ROLE=role; enter(); }

const MIN_SPIN=500;      // 加载动画最短展示时长（ms）
function showLoader(){
  document.getElementById('intelList').innerHTML=
    `<div class="loader"><div class="spinner"></div><span>正在加载日报…</span></div>`;
}
function minWait(t0){ return new Promise(r=>setTimeout(r, Math.max(0, MIN_SPIN-(Date.now()-t0)))); }

async function enter(){
  document.getElementById('authView').style.display='none';
  document.getElementById('reportView').style.display='block';
  const u=USERS[ROLE];
  document.getElementById('who').textContent=`你好，${u.name}（${u.who}）`;
  document.getElementById('dateBtnLabel').textContent='加载中…';
  showLoader();
  const t0=Date.now();
  // 读日报索引，建立"哪些天有日报"
  try{
    const idx=await (await fetch(`${REPORT_DIR}/index.json`,{cache:'no-store'})).json();
    AVAIL={};
    (idx.reports||[]).forEach(r=>{AVAIL[r.date]=(ROLE==='AE'?r.ae_count:r.am_count);});
  }catch(e){ AVAIL={}; }
  DATES=Object.keys(AVAIL).sort();
  if(!DATES.length){
    await minWait(t0);
    document.getElementById('dateBtnLabel').textContent='暂无日报';
    document.getElementById('intelList').innerHTML=`<div class="empty-day">还没有生成日报。引擎跑过 collect → refine → compose 后这里就有内容了。</div>`;
    return;
  }
  SEL_DATE=DATES[DATES.length-1];          // 默认最新一天
  const d=new Date(SEL_DATE); calY=d.getFullYear(); calM=d.getMonth();
  renderCal();
  await loadDay(SEL_DATE, t0);             // 复用同一计时，整段加载 ≥ MIN_SPIN
}

/* ---- 日历 ---- */
function toggleCal(e){ e&&e.stopPropagation(); document.getElementById('datebar').classList.toggle('open'); }
function calMonth(delta,e){
  e&&e.stopPropagation();
  calM+=delta; if(calM<0){calM=11;calY--;} if(calM>11){calM=0;calY++;}
  renderCal();
}
function renderCal(){
  document.getElementById('calTitle').textContent=`${calY}年${calM+1}月`;
  const first=new Date(calY,calM,1);
  let lead=(first.getDay()+6)%7;           // 周一为一周起点
  const days=new Date(calY,calM+1,0).getDate();
  const todayStr=new Date().toISOString().slice(0,10);
  let html=['一','二','三','四','五','六','日'].map(d=>`<span class="cal-dow">${d}</span>`).join('');
  for(let i=0;i<lead;i++) html+=`<span class="cal-day"></span>`;
  for(let day=1;day<=days;day++){
    const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const cls=['cal-day'];
    if(AVAIL[ds]!=null) cls.push('has');
    if(ds===SEL_DATE) cls.push('sel');
    if(ds===todayStr) cls.push('today');
    const click=AVAIL[ds]!=null?`onclick="pickDay('${ds}',event)"`:'';
    html+=`<span class="${cls.join(' ')}" ${click}>${day}</span>`;
  }
  document.getElementById('calGrid').innerHTML=html;
}
function pickDay(ds,e){
  e&&e.stopPropagation();
  SEL_DATE=ds; document.getElementById('datebar').classList.remove('open');
  renderCal(); loadDay(ds);
}
/* 前一天 / 后一天：在"有日报的日期"之间跳，到边界则禁用 */
function stepDay(dir){
  const i=DATES.indexOf(SEL_DATE), ni=i+dir;
  if(i<0 || ni<0 || ni>=DATES.length) return;
  SEL_DATE=DATES[ni];
  const d=new Date(SEL_DATE); calY=d.getFullYear(); calM=d.getMonth();
  renderCal(); loadDay(SEL_DATE);
}
function updateDayNav(){
  const i=DATES.indexOf(SEL_DATE);
  document.getElementById('prevDay').disabled = (i<=0);
  document.getElementById('nextDay').disabled = (i<0 || i>=DATES.length-1);
}

/* ---- 加载某一天的日报（t0 为空则自行计时并显示加载动画）---- */
async function loadDay(date, t0){
  const start = (t0!=null) ? t0 : (showLoader(), Date.now());
  SEL_DATE=date; updateDayNav();
  document.getElementById('dateBtnLabel').textContent=date;
  document.getElementById('rTitle').textContent=`日报 · ${date}`;
  let rep=null;
  try{ rep=await (await fetch(`${REPORT_DIR}/report_${date}.json`,{cache:'no-store'})).json(); }
  catch(e){ rep=null; }
  await minWait(start);
  const seg = rep ? (ROLE==='AE'?rep.ae:rep.am) : null;
  if(!seg){
    document.getElementById('rMeta').textContent='';
    document.getElementById('intelList').innerHTML=`<div class="empty-day">这一天暂无日报。</div>`;
    CUR_ITEMS=[]; return;
  }
  CUR_ITEMS=seg.items||[];
  document.getElementById('rMeta').textContent=
    (rep.lede?rep.lede+' · ':'')+`按「${ROLE}」精选 ${CUR_ITEMS.length} 条可行动情报`;
  document.getElementById('intelList').innerHTML=CUR_ITEMS.map(card).join('');
}

function card(i){
  const cats=(i.category||[]).map(c=>`<span class="chip cat-${c}">${c}</span>`).join('');
  const inds=(i.industry||[]).map(c=>`<span class="chip">${c}</span>`).join('');
  const hot=(i.score||0)>=0.8;
  const title=i.url?`<a href="${i.url}" target="_blank" rel="noopener">${i.title}</a>`:i.title;
  return `<div class="card intel">
    <div class="meta">
      ${hot?'<span class="signal-hot">🔥 高信号</span>':''}
      ${cats}
      ${i.signal_type?`<span class="chip">${i.signal_type}</span>`:''}
      ${inds}
    </div>
    <h3>${title}</h3>
    ${i.summary?`<div class="line"><b>概览：</b>${i.summary}${i.comment?' '+i.comment:''}</div>`
               :`<div class="line"><b>点评：</b>${i.comment||''}</div>`}
    <div class="line"><b>动作：</b>${i.action||''}</div>
    <div class="foot">
      <span class="src">来源：${i.source||i.citation||''}</span>
      <div class="card-actions">
        <span class="fbgroup">
          <button class="fb" onclick="vote(${i.id},'up',this)" title="对我有用">👍</button>
          <button class="fb" onclick="vote(${i.id},'down',this)" title="没用">👎</button>
        </span>
        <button class="btn btn-grad btn-sm" onclick="matchClient(${i.id})">匹配我的客户</button>
      </div>
    </div>
  </div>`;
}
/* ---- 周期切换：日报 / 周报 / 月报 ---- */
function switchCad(btn){
  document.querySelectorAll('#reportView .tabs .tab').forEach(t=>t.classList.remove('on'));
  btn.classList.add('on');
  const cad=btn.dataset.cad;
  document.getElementById('dailyView').style.display   = cad==='daily'  ?'block':'none';
  document.getElementById('weeklyView').style.display  = cad==='weekly' ?'block':'none';
  document.getElementById('monthlyView').style.display = cad==='monthly'?'block':'none';
  const meta={daily:['每日情报','日报'],weekly:['每周赋能','周报 · 把信息炼成能力'],monthly:['每月特刊','月报']}[cad];
  document.querySelector('#reportView .report-top .eyebrow').textContent=meta[0];
  document.getElementById('rMeta').textContent='';
  document.getElementById('rTitle').textContent = (cad==='daily' && SEL_DATE)?('日报 · '+SEL_DATE):meta[1];
  if(cad==='weekly') loadWeekly();
  if(cad==='monthly') loadMonthly();
}
async function loadWeekly(){
  const v=document.getElementById('weeklyView');
  v.innerHTML='<div class="loader"><div class="spinner"></div><span>加载周报…</span></div>';
  let slots;
  try{ slots=(await (await fetch('/api/slots?type=weekly',{cache:'no-store'})).json()).slots; }
  catch(e){ v.innerHTML='<div class="empty-day">周报暂不可用。</div>'; return; }
  const pub=(slots||[]).filter(s=>s.state==='published');
  if(!pub.length){ v.innerHTML='<div class="empty-day">本期周报正在制作中，发布后会出现在这里。</div>'; return; }
  v.innerHTML=pub.map(s=>'<a class="card intel" href="'+s.url+'" target="_blank" rel="noopener" style="display:block">'+
    '<div class="meta"><span class="chip">周报</span><span class="chip">发布日 '+s.period+'</span></div>'+
    '<h3>'+(s.title||('周报 · '+s.period+' 当周'))+'</h3>'+
    '<div class="line"><b>打开本周周报</b> —— 翻页杂志：本周复盘 + 可复用话术 + AI 播客 + 自测 →</div></a>').join('');
}
async function loadMonthly(){
  const v=document.getElementById('monthlyView');
  v.innerHTML='<div class="loader"><div class="spinner"></div><span>加载月报…</span></div>';
  let items;
  try{ items=(await (await fetch('/api/monthly',{cache:'no-store'})).json()).items; }
  catch(e){ v.innerHTML='<div class="empty-day">月报暂不可用。</div>'; return; }
  const pub=(items||[]).filter(x=>x.status==='published');
  if(!pub.length){ v.innerHTML='<div class="empty-day">月报是人主导的深度特刊——行业复盘、方法沉淀、AI 播客/视频，按月发布。本期筹备中。</div>'; return; }
  v.innerHTML=pub.map(x=>'<a class="card intel" href="'+x.url+'" target="_blank" rel="noopener" style="display:block">'+
    '<div class="meta"><span class="chip">月报</span><span class="chip">'+x.period+'</span></div>'+
    '<h3>'+(x.title||'月度特刊')+'</h3>'+
    '<div class="line"><b>打开月报特刊</b> —— 行业复盘 + 方法沉淀 + AI 播客/视频 →</div></a>').join('');
}

/* ---- 有用/没用 反馈（埋点）---- */
async function vote(id, v, el){
  const wrap=el.closest('.fbgroup');
  try{
    await fetch('/api/feedback',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({news_id:id, role:ROLE, vote:v})});
  }catch(e){ /* 演示环境忽略 */ }
  wrap.innerHTML=`<span class="fb-tip">${v==='up'?'👍':'👎'} 谢谢反馈</span>`;
}

/* ---- 匹配我的客户（真 LLM）---- */
let CUR_MATCHES=[], CUR_NEWS=null;
function newsPayload(i){
  return {title:i.title, summary:i.summary, comment:i.comment,
          category:i.category, industry:i.industry};
}
function openModal(){document.getElementById('modal').classList.add('show');}
function closeModal(){document.getElementById('modal').classList.remove('show');}

async function matchClient(id){
  const i=CUR_ITEMS.find(x=>x.id===id); if(!i) return;
  CUR_NEWS=i; openModal();
  document.getElementById('mTitle').textContent=i.title;
  const body=document.getElementById('mBody');
  body.innerHTML=`<div class="loader"><div class="spinner"></div><span>正在让 AI 比对你的客户名单…</span></div>`;
  let res;
  try{
    res=await (await fetch('/api/match',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({role:ROLE, news:newsPayload(i)})})).json();
  }catch(e){ body.innerHTML=`<p class="muted">匹配失败，请稍后再试。</p>`; return; }
  CUR_MATCHES=res.matches||[];
  if(!CUR_MATCHES.length){
    body.innerHTML=`<p class="muted">这条暂时没匹配到你名单里的客户。</p>`; return;
  }
  body.innerHTML=CUR_MATCHES.map(matchCard).join('');
}
function matchCard(m, idx){
  const stageCls = m.stage==='已成交' ? 'cat-我方生态' : 'cat-竞品';
  return `<div class="mcli">
    <div class="mcli-h"><strong>${m.client}</strong><span class="chip ${stageCls}">${m.stage||''}</span></div>
    <div class="line"><b>为什么相关：</b>${m.why||''}</div>
    <div class="line"><b>切入角度：</b>${m.angle||''}</div>
    <button class="btn btn-grad btn-sm" onclick="genPitch(${idx}, this)">为「${m.client}」生成话术</button>
    <div class="pitch-slot" id="pslot-${idx}"></div>
  </div>`;
}
async function genPitch(idx, btn){
  const m=CUR_MATCHES[idx]; const slot=document.getElementById('pslot-'+idx);
  btn.disabled=true;
  slot.innerHTML=`<div class="loader" style="padding:16px"><div class="spinner"></div><span>生成话术中…</span></div>`;
  try{
    const r=await (await fetch('/api/pitch',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({role:ROLE, client:m.client, news:newsPayload(CUR_NEWS)})})).json();
    slot.innerHTML=`<div class="pitch">${r.pitch||'(空)'}</div>`;
  }catch(e){ slot.innerHTML=`<p class="muted">生成失败，请重试。</p>`; }
  btn.disabled=false;
}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});
// 点空白关日历
document.addEventListener('click',e=>{
  const bar=document.getElementById('datebar');
  if(bar.classList.contains('open') && !bar.contains(e.target)) bar.classList.remove('open');
});
</script>
</body>
</html>
