<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>用户端 · Airwallex 销售情报</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/style.css">
</head>
<body class="app-bg">

<header class="pagehead">
  <div class="wrap row">
    <div class="wordmark"><span class="dot"></span>销售情报 · 用户端</div>
    <a class="back" href="index.html">← 返回首页</a>
  </div>
</header>

<!-- 注册 -->
<div id="authView" class="auth-wrap">
  <div class="card auth-card">
    <h1>注册 / 登录</h1>
    <p class="sub">选择你的身份，我们只把跟你相关的情报推给你。</p>
    <div class="field">
      <label>工作邮箱</label>
      <input id="email" type="email" placeholder="you@airwallex.com" value="zhang.san@airwallex.com">
    </div>
    <div class="field">
      <label>你的身份</label>
      <div class="role-opts">
        <div class="role-opt sel" data-role="AE">
          <strong>AE · 拓新销售</strong><span>Hunter，签新客</span>
        </div>
        <div class="role-opt" data-role="AM">
          <strong>AM · 客户成功</strong><span>Farmer，维护扩量</span>
        </div>
      </div>
    </div>
    <div class="field">
      <label>负责行业</label>
      <select id="industry">
        <option>电商 / 独立站</option>
        <option>游戏出海</option>
        <option>OTA / 旅游</option>
        <option>SaaS</option>
        <option>B2B 外贸</option>
      </select>
    </div>
    <button class="btn btn-grad" style="width:100%;justify-content:center" onclick="enter()">注册并进入</button>
  </div>
</div>

<!-- 报告 -->
<div id="reportView" class="wrap" style="display:none">
  <div class="report-top">
    <div>
      <div class="eyebrow">每日情报</div>
      <h1 id="rTitle">日报</h1>
      <div class="report-meta" id="rMeta"></div>
    </div>
    <div class="who" id="who"></div>
  </div>

  <!-- 日期选择器（日历下拉）-->
  <div class="datebar" id="datebar">
    <button class="datebtn" onclick="toggleCal(event)">
      <span>📅</span><span id="dateBtnLabel">选择日期</span><span class="caret">▾</span>
    </button>
    <div class="calpop" id="calpop">
      <div class="cal-head">
        <button class="cal-nav" onclick="calMonth(-1,event)">‹</button>
        <span class="cal-title" id="calTitle"></span>
        <button class="cal-nav" onclick="calMonth(1,event)">›</button>
      </div>
      <div class="cal-grid" id="calGrid"></div>
      <div class="cal-foot"><span class="dot-legend"></span>有日报的日期可点击</div>
    </div>
  </div>

  <div id="intelList"></div>
</div>

<!-- 话术 modal -->
<div class="modal-bg" id="modal">
  <div class="modal">
    <button class="modal-x" onclick="closeModal()">×</button>
    <div class="eyebrow">结合你的客户 · 生成话术</div>
    <h3 id="mTitle"></h3>
    <div class="pitch" id="mPitch"></div>
    <p class="muted" style="font-size:12px;margin:0">示例输出。生产环境为实时调用 LLM，结合该用户负责的具体客户档案生成。</p>
  </div>
</div>

<script>
const REPORT_DIR='data/reports';
let ROLE="AE";
let AVAIL={};          // 当前角色：date -> count（哪些天有日报）
let CUR_ITEMS=[];      // 当前展示的情报，供话术 modal 取数
let SEL_DATE=null;     // 选中的日期
let calY, calM;        // 日历当前显示的年/月（0-based month）

document.querySelectorAll('.role-opt').forEach(o=>o.onclick=()=>{
  document.querySelectorAll('.role-opt').forEach(x=>x.classList.remove('sel'));
  o.classList.add('sel'); ROLE=o.dataset.role;
});

const MIN_SPIN=500;      // 加载动画最短展示时长（ms）
function showLoader(){
  document.getElementById('intelList').innerHTML=
    `<div class="loader"><div class="spinner"></div><span>正在加载日报…</span></div>`;
}
function minWait(t0){ return new Promise(r=>setTimeout(r, Math.max(0, MIN_SPIN-(Date.now()-t0)))); }

async function enter(){
  document.getElementById('authView').style.display='none';
  document.getElementById('reportView').style.display='block';
  const ind=document.getElementById('industry').value;
  document.getElementById('who').textContent=`你好，张三（${ROLE==='AE'?'AE · 拓新':'AM · 客户成功'} · ${ind}）`;
  document.getElementById('dateBtnLabel').textContent='加载中…';
  showLoader();
  const t0=Date.now();
  // 读日报索引，建立"哪些天有日报"
  try{
    const idx=await (await fetch(`${REPORT_DIR}/index.json`,{cache:'no-store'})).json();
    AVAIL={};
    (idx.reports||[]).filter(r=>r.role===ROLE).forEach(r=>{AVAIL[r.date]=r.count;});
  }catch(e){ AVAIL={}; }
  const dates=Object.keys(AVAIL).sort();
  if(!dates.length){
    await minWait(t0);
    document.getElementById('dateBtnLabel').textContent='暂无日报';
    document.getElementById('intelList').innerHTML=`<div class="empty-day">还没有生成日报。引擎跑过 collect → refine → compose 后这里就有内容了。</div>`;
    return;
  }
  SEL_DATE=dates[dates.length-1];          // 默认最新一天
  const d=new Date(SEL_DATE); calY=d.getFullYear(); calM=d.getMonth();
  renderCal();
  await loadDay(SEL_DATE, t0);             // 复用同一计时，整段加载 ≥ MIN_SPIN
}

/* ---- 日历 ---- */
function toggleCal(e){ e&&e.stopPropagation(); document.getElementById('datebar').classList.toggle('open'); }
function calMonth(delta,e){
  e&&e.stopPropagation();
  calM+=delta; if(calM<0){calM=11;calY--;} if(calM>11){calM=0;calY++;}
  renderCal();
}
function renderCal(){
  document.getElementById('calTitle').textContent=`${calY}年${calM+1}月`;
  const first=new Date(calY,calM,1);
  let lead=(first.getDay()+6)%7;           // 周一为一周起点
  const days=new Date(calY,calM+1,0).getDate();
  const todayStr=new Date().toISOString().slice(0,10);
  let html=['一','二','三','四','五','六','日'].map(d=>`<span class="cal-dow">${d}</span>`).join('');
  for(let i=0;i<lead;i++) html+=`<span class="cal-day"></span>`;
  for(let day=1;day<=days;day++){
    const ds=`${calY}-${String(calM+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const cls=['cal-day'];
    if(AVAIL[ds]!=null) cls.push('has');
    if(ds===SEL_DATE) cls.push('sel');
    if(ds===todayStr) cls.push('today');
    const click=AVAIL[ds]!=null?`onclick="pickDay('${ds}',event)"`:'';
    html+=`<span class="${cls.join(' ')}" ${click}>${day}</span>`;
  }
  document.getElementById('calGrid').innerHTML=html;
}
function pickDay(ds,e){
  e&&e.stopPropagation();
  SEL_DATE=ds; document.getElementById('datebar').classList.remove('open');
  renderCal(); loadDay(ds);
}

/* ---- 加载某一天的日报（t0 为空则自行计时并显示加载动画）---- */
async function loadDay(date, t0){
  const start = (t0!=null) ? t0 : (showLoader(), Date.now());
  document.getElementById('dateBtnLabel').textContent=date;
  document.getElementById('rTitle').textContent=`日报 · ${date}`;
  let rep=null;
  try{ rep=await (await fetch(`${REPORT_DIR}/report_${date}_${ROLE}.json`,{cache:'no-store'})).json(); }
  catch(e){ rep=null; }
  await minWait(start);
  if(!rep){
    document.getElementById('rMeta').textContent='';
    document.getElementById('intelList').innerHTML=`<div class="empty-day">这一天暂无日报。</div>`;
    CUR_ITEMS=[]; return;
  }
  CUR_ITEMS=rep.items||[];
  document.getElementById('rMeta').textContent=
    (rep.lede?rep.lede+' · ':'')+`按「${ROLE}」精选 ${CUR_ITEMS.length} 条可行动情报`;
  document.getElementById('intelList').innerHTML=CUR_ITEMS.map(card).join('');
}

function card(i){
  const cats=(i.category||[]).map(c=>`<span class="chip cat-${c}">${c}</span>`).join('');
  const inds=(i.industry||[]).map(c=>`<span class="chip">${c}</span>`).join('');
  const hot=(i.score||0)>=0.8;
  const title=i.url?`<a href="${i.url}" target="_blank" rel="noopener">${i.title}</a>`:i.title;
  return `<div class="card intel">
    <div class="meta">
      ${hot?'<span class="signal-hot">🔥 高信号</span>':''}
      ${cats}
      ${i.signal_type?`<span class="chip">${i.signal_type}</span>`:''}
      ${inds}
    </div>
    <h3>${title}</h3>
    <div class="line"><b>点评：</b>${i.comment||''}</div>
    <div class="line"><b>动作：</b>${i.action||''}</div>
    <div class="foot">
      <span class="src">来源：${i.source||i.citation||''}</span>
      <button class="btn btn-grad btn-sm" onclick="pitch(${i.id})">结合我的客户生成话术</button>
    </div>
  </div>`;
}
function pitch(id){
  const i=CUR_ITEMS.find(x=>x.id===id); if(!i) return;
  document.getElementById('mTitle').textContent=i.title;
  document.getElementById('mPitch').textContent=
`【开场】最近留意到「${i.title}」，想到您这边可能正好用得上。

【为什么和您相关】${i.comment||''}

【我们能做什么】${i.action||''}

【建议下一步】方便的话约 15 分钟，我把对应的 Airwallex 方案和报价给您过一遍。`;
  document.getElementById('modal').classList.add('show');
}
function closeModal(){document.getElementById('modal').classList.remove('show');}
document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});
// 点空白关日历
document.addEventListener('click',e=>{
  const bar=document.getElementById('datebar');
  if(bar.classList.contains('open') && !bar.contains(e.target)) bar.classList.remove('open');
});
</script>
</body>
</html>
